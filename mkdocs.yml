site_name: "Storage Account Overlay"
site_description: Documentation for Storage Account Overlay
repo_url: https://github.com/POps-Rox/tf-az-overlays-storageaccount
edit_uri: edit/main/docs/

nav:
  - Home: index.md

plugins:
  - techdocs-core

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
